{% extends "heron/table_courant.html" %}

{% load filters_tags %}
{% block table %}

    <div class="four wide column"></div>
    <div class="eight wide column">

    <table id="table_document"
       class="ui celled table"
       style="font-size: 12px !important;text-align: center;font-weight: 900;">
        <thead>

            <tr>
                <th style="width: 20%">Tiers X3</th>
                <th style="width: 70%;text-align: left;">Email</th>
            </tr>
        </thead>
        <tbody>
        {% for email in emails_errors %}
            <tr>
                <td>
                      {{ email.third_party_num|default_if_none:'' }}
                </td>
                <td style="text-align: left;">
                      {{ email.email|default_if_none:'' }}
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock table %}
